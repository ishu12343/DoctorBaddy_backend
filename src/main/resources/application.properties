# Database Configuration - PostgreSQL (Neon)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-super-cloud-aqhfj0xx-pooler.c-8.us-east-1.aws.neon.tech/DoctorBaddy?sslmode=require&channel_binding=require}
